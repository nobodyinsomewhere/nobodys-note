<!doctype html>
<html lang="zh-CN" data-theme="mist-cyan">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>nobody's note</title>
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="site-wrap">
    <header class="site-header v2-header">
      <div class="header-topline">
        <span class="topline-mark">卷一</span>
        <span class="topline-text">private fragments / low profile archive</span>
      </div>

      <div class="hero-block">
        <div class="hero-main">
          <h1 class="site-title">nobody's note</h1>
          <p class="site-subtitle">一些零散的记录与沉默的想法。</p>
          <p class="hero-intro">
            这里不试图解释太多，也不提供互动。  
            它更像一册安静摊开的手记，收纳一些未必重要、却也不想丢掉的东西。
          </p>
        </div>

        <aside class="hero-side">
          <div class="theme-panel">
            <label for="themeSelect">主题</label>
            <select id="themeSelect">
              <option value="moon-paper">月白纸页</option>
              <option value="mist-cyan">雾青札记</option>
              <option value="ink-night">墨蓝夜读</option>
              <option value="parchment">羊皮卷</option>
              <option value="violet-mist">鸢紫薄雾</option>
            </select>
          </div>

          <div class="side-note">
            <div class="side-note-title">记事</div>
            <p>
              不追求热闹，也不着急解释。  
              只是把仍然想留下的东西，一点一点放在这里。
            </p>
          </div>
        </aside>
      </div>
    </header>

    <main class="home-main">
      <section class="section-head">
        <div>
          <p class="section-kicker">archive</p>
          <h2 class="section-title">最近的记录</h2>
        </div>
        <p class="section-desc">这些文字没有顺序，只是被安放在这里。</p>
      </section>

      <section class="post-list refined-list" id="postList">
        <article class="post-card refined-card">
          <div class="post-meta">加载中…</div>
          <h2 class="post-title">正在读取文章列表</h2>
          <p class="post-excerpt">如果长时间停留在这里，请检查 posts.json 是否存在。</p>
        </article>
      </section>
    </main>

    <footer class="site-footer v2-footer">
      <div class="footer-line"></div>
      <p>no comments, no noise, only notes.</p>
    </footer>
  </div>

  <script src="./app.js"></script>
</body>
            </html>
